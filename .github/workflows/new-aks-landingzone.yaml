name: New AKS Landingzone

on:
  workflow_dispatch:
    inputs:
      destination_repo:
        description: Destination repo
        required: true
        type: string
        default: eskillarsen/app-1
      destination_repo_path:
        description: Destination repo path
        required: true
        type: string
        default: manifests/

env:
  platform_repo: "eskillarsen/platform-1"
  platform_repo_template_manifests: "eskillarsen/platform-1/template-app-manifests/"
  github_user_name: "github-actions"
  github_email: "41898282+github-actions[bot]@users.noreply.github.com"
  github_branch_name: "initial-k8s-manifests
  github_commit_message: "Add initial Kubernetes manifests for AKS landingzone"

permissions:
  contents: read

jobs:
  sync-wiki:
    name: New AKS Landingzone
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }} # Create a token for all repositories in the current owner's installation

      - name: Checkout Platform Repo
        uses: actions/checkout@v6
        with:
          repository: ${{ env.platform_repo }}
          path: ${{ env.platform_repo }}

      - name: Checkout Destination Repo
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.destination_repo }}
          path: ${{ inputs.destination_repo }}
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Configure Local Git
        run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          
          # git config --global user.name $github_user_name
          # git config --global user.email $github_email
        working-directory: ${{ env.GITHUB_WORKSPACE }}

      - name: Copy template manifests into destination repo
        run: |
          ls -R
          mkdir -p "${{ inputs.destination_repo }}/${{ inputs.destination_repo_path }}"
          rsync -avzr "${{ env.platform_repo_template_manifests }}" "${{ inputs.destination_repo }}/${{ inputs.destination_repo_path }}"
          # cp -R "${{ env.platform_repo_template_manifests }}/*" "${{ inputs.destination_repo }}/${{ inputs.destination_repo_path }}"
        working-directory: ${{ env.GITHUB_WORKSPACE }}

      - name: Create PR with manifests
        run: |
          git checkout -b "$github_branch_name"
          git add .
          git commit -m "$github_commit_message"
          git push --set-upstream "https://$GITHUB_TOKEN@github.com/${{ inputs.destination_repo }}.git" "initial-k8s-manifests"
          gh pr create --title "Pull request title" --body "Pull request body"
        working-directory: ${{ inputs.destination_repo }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
