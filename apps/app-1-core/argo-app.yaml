apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-1
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/eskillarsen/app-1'
    targetRevision: main
    path: 'k8s/'
  destination:
    server: 'https://default.svc'
    namespace: app-1
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
